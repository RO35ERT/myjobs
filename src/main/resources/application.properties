# Quarkus Job Scraper Configuration

# 1. Site & Keyword Config
job.scraper.sites-file=sites.txt
job.scraper.keywords=Software,Developer,Programmer,Analyst,ICT,Java,Python,Laravel, Backend

# 2. Email Recipient
job.scraper.email.recipient=${MYJOBS_EMAIL_RECIPIENT}
%test.job.scraper.email.recipient=test@localhost

# 3. Cache Configuration (Deduplication)
# Expires records after 24 hours to handle daily digests
quarkus.cache.caffeine."job-deduplication".expire-after-write=24h

# 4. Mailer Configuration (SMTP)
# You MUST replace these with your actual SMTP details
quarkus.mailer.host=${MYJOBS_SMTP_HOST:smtp.gmail.com}
quarkus.mailer.port=${MYJOBS_SMTP_PORT:587}
quarkus.mailer.username=${MYJOBS_SMTP_USERNAME}
quarkus.mailer.password=${MYJOBS_SMTP_PASSWORD}
%test.quarkus.mailer.username=testuser
%test.quarkus.mailer.password=testpass
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.login=REQUIRED
quarkus.mailer.auth-methods=DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN
quarkus.mailer.from=${MYJOBS_EMAIL_FROM}
%test.quarkus.mailer.from=test@localhost
quarkus.mailer.timeout=10S
quarkus.mailer.mock=false
%test.quarkus.mailer.mock=true

# 5. Logging
quarkus.log.level=INFO
quarkus.log.category."com.tumbwe".level=DEBUG
quarkus.log.category."io.quarkus.mailer".level=DEBUG

quarkus.http.port=0
