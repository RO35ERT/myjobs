# Quarkus Job Scraper Configuration

# 1. Site & Keyword Config
job.scraper.sites-file=sites.txt
job.scraper.keywords=Software,Developer,Programmer,Analyst,ICT,Java,Python,Laravel, Backend

# 2. Email Recipient
job.scraper.email.recipient=${MYJOBS_EMAIL_RECIPIENT:admin@example.com}

# 3. Cache Configuration (Deduplication)
# Expires records after 24 hours to handle daily digests
quarkus.cache.caffeine."job-deduplication".expire-after-write=24h

# 4. Brevo API Configuration
brevo.api.key=${BREVO_API_KEY:dummy-brevo-key}
brevo.sender.name=${BREVO_SENDER_NAME:My Job Scraper}
brevo.sender.email=${BREVO_SENDER_EMAIL:${MYJOBS_EMAIL_FROM:sender@example.com}}

# 5. Logging
quarkus.log.level=INFO
# quarkus.config.log.filter=telegram.bot.token=hide (removed unrecognized key)

# HTTP Server Configuration
quarkus.http.port=8090

# Scheduler Configuration
# Using UTC default as requested
# quarkus.scheduler.timezone=Africa/Lusaka

# Disable Dev Services for SQLite as it is not supported
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false

# 6. Native Image Configuration
# Delay initialization of Brevo/OkHttp classes to runtime to avoid SecureRandom in the image heap
# Enable http/https URL protocols so Jsoup's URL validation (java.net.URL) works in native image
quarkus.native.additional-build-args=--initialize-at-run-time=brevo.ApiClient\\,brevo.Configuration\\,brevoApi.TransactionalEmailsApi\\,brevoModel.ModelApiResponse\\,org.apache.http.impl.auth.NTLMEngineImpl,--enable-url-protocols=http\\,https
quarkus.native.resources.includes=sites.txt
quarkus.ssl.native=true

# 7. SQLite Database Config
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:jobs.db?busy_timeout=5000&journal_mode=WAL
quarkus.datasource.jdbc.max-size=1
quarkus.hibernate-orm.validate-in-dev-mode=false
# Fix physical naming strategy to avoid clashes
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 8. Telegram Bot Config
telegram.bot.token=${TELEGRAM_BOT_TOKEN:000:dummy-telegram-token}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:dummy_bot}
