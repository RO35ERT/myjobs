# Quarkus Job Scraper Configuration

# 1. Site & Keyword Config
job.scraper.sites-file=sites.txt
job.scraper.keywords=Software,Developer,Programmer,Analyst,ICT,Java,Python,Laravel, Backend

# 2. Email Recipient
job.scraper.email.recipient=${MYJOBS_EMAIL_RECIPIENT}
%test.job.scraper.email.recipient=test@localhost

# 3. Cache Configuration (Deduplication)
# Expires records after 24 hours to handle daily digests
quarkus.cache.caffeine."job-deduplication".expire-after-write=24h

# 4. Brevo API Configuration
brevo.api.key=${BREVO_API_KEY}
%test.brevo.api.key=xkeysib-test-mock-key
brevo.sender.name=${BREVO_SENDER_NAME:My Job Scraper}
brevo.sender.email=${MYJOBS_EMAIL_FROM}
%test.brevo.sender.email=test@example.com

# 5. Logging
quarkus.log.level=INFO
quarkus.log.category."com.tumbwe".level=DEBUG
quarkus.log.category."io.quarkus.mailer".level=DEBUG

quarkus.http.port=0

# 6. Native Image Fix for Brevo SDK
# Delay initialization of Brevo/OkHttp classes to runtime to avoid SecureRandom in the image heap
quarkus.native.additional-build-args=--initialize-at-run-time=brevo.ApiClient\\,brevo.Configuration\\,brevoApi.TransactionalEmailsApi\\,brevoModel.ModelApiResponse
